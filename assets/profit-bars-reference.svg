  <style>
    @keyframes profit-bar-in { to { opacity: 1; transform: scaleY(1); } }
    @keyframes profit-mark-in { to { opacity: 1; } }
    g:nth-of-type(1) rect, g:nth-of-type(2) path {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: 50% 100%;
      transform: scaleY(.06);
      animation: profit-bar-in .48s cubic-bezier(.2,.78,.22,1) forwards;
    }
    g:nth-of-type(1) rect:nth-child(1), g:nth-of-type(2) path:nth-child(1) { animation-delay: .08s; }
    g:nth-of-type(1) rect:nth-child(2), g:nth-of-type(2) path:nth-child(2) { animation-delay: .14s; }
